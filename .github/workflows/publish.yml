name: Publish Package to npm

on:
  release:
    types: [published]
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run validation
        run: pnpm validate

      - name: Build
        run: pnpm build

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Clear .npmrc auth token for OIDC
        run: npm config delete //registry.npmjs.org/:_authToken

      - name: Publish to npm
        run: npm publish --provenance
